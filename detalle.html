<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>NexVertex</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="hero">

  <iframe id="trailer" class="bg-video" src="" frameborder="0" allow="autoplay; fullscreen"></iframe>

  <iframe 
  id="iframe2"
  class="player"
  src=""
  frameborder="0"
  allowfullscreen>
</iframe>

  <div class="overlay">
    <h1 id="title"></h1>

    <div class="info">
      <span>⭐ 8.3</span>
      <span id="year"></span>
      <span id="genre"></span>
    </div>

    <p class="sinopsis" id="sinopsis"></p>

    <div class="buttons">
      <button class="play" onclick="openServerModal()">
        <i class="fa-solid fa-play"></i> Play
      </button>

      <button class="icon">
        <i class="fa-solid fa-plus"></i>
      </button>

      <button class="icon">
        <i class="fa-solid fa-download"></i>
      </button>

      <button class="icon" onclick="playTrailerSound()">
        <i class="fa-solid fa-volume-high"></i>
      </button>
    </div>
  </div>

</div>

<!-- MODAL SERVIDORES -->
<div id="serverModal" class="modal">
  <div class="modal-box">

    <div class="modal-header">
      <h2>SERVERS</h2>
      <span onclick="closeModal()">✕</span>
    </div>

    <div class="server-item" onclick="startServer(server1)">
      <div>
        <p>Servidor 1</p>
        <span>HD • Latino</span>
      </div>
      <i class="fa-solid fa-play"></i>
    </div>

    <div class="server-item" onclick="startServer(server2)">
      <div>
        <p>Servidor 2</p>
        <span>HD • Latino</span>
      </div>
      <i class="fa-solid fa-play"></i>
    </div>

  </div>
</div>

<div class="actors">
  <h2>Actors</h2>

  <div class="actor-grid">

    <div class="actor-card">
      <img src="actor1.jpg">
      <div>
        <p class="name">Eve Ryan</p>
        <span>Hasley Weigel</span>
      </div>
    </div>

    <div class="actor-card">
      <img src="actor2.jpg">
      <div>
        <p class="name">Mikel Niso</p>
        <span>Luke Howland</span>
      </div>
    </div>

    <div class="actor-card">
      <img src="actor3.jpg">
      <div>
        <p class="name">Biel Antón</p>
        <span>Matt</span>
      </div>
    </div>

    <div class="actor-card">
      <img src="actor4.jpg">
      <div>
        <p class="name">Paula García Lara</p>
        <span>Profesora de Primaria</span>
      </div>
    </div>

  </div>
</div>

function openServerModal() {
  document.getElementById("serverModal").style.display = "flex";
}

function closeModal() {
  document.getElementById("serverModal").style.display = "none";
}

function startServer(server) {
  document.getElementById("serverModal").style.display = "none";

  const iframe = document.getElementById("iframe2");
  iframe.src = server;
  iframe.style.display = "block";

  document.getElementById("trailer").style.display = "none";
}

function playTrailerSound() {
  const trailer = document.getElementById("trailer");
  trailer.src = trailer.src.replace("mute=1", "mute=0") + "&autoplay=1";
}

document.getElementById("serverModal").onclick = function () {
  this.style.display = "none";
};
